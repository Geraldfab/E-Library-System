{% extends "base.html" %}

{% block title %}Read {{ book.title }}{% endblock %}

{% block extra_css %}
<style>
    .reader-container {
        max-width: 100%;
        margin: 0;
        padding: 0;
    }

    .reader-header {
        background: linear-gradient(135deg, #212121 0%, #616060 100%);
        padding: 20px 30px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .reader-header h1 {
        font-size: 1.5rem;
        margin: 0;
    }

    .reader-header .book-info {
        font-size: 0.9rem;
        opacity: 0.9;
    }

    .reader-viewer {
        width: 100%;
        height: calc(100vh - 100px);
        border: none;
    }

    .reader-controls {
        display: flex;
        gap: 15px;
    }

    .reader-btn {
        padding: 10px 20px;
        background: rgba(255,255,255,0.2);
        color: white;
        border: none;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 500;
    }

    .reader-btn:hover {
        background: rgba(255,255,255,0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="reader-container">
    <div class="reader-header">
        <div>
            <h1><i class="fas fa-book-reader"></i> {{ book.title }}</h1>
            <p class="book-info">by {{ book.author }}</p>
        </div>
        <div class="reader-controls">
            <a href="{{ url_for('library') }}" class="reader-btn">
                <i class="fas fa-arrow-left"></i> Back to Library
            </a>
            <a href="{{ url_for('static', filename='uploads/ebooks/' + book.ebook_file) }}" class="reader-btn" target="_blank">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
    </div>
    
    <iframe class="reader-viewer" src="{{ url_for('static', filename='uploads/ebooks/' + book.ebook_file) }}#toolbar=0&navpanes=0">
        <p>Your browser does not support PDF viewing. 
        <a href="{{ url_for('static', filename='uploads/ebooks/' + book.ebook_file) }}">Click here to download the PDF</a></p>
    </iframe>
</div>
{% endblock %}
