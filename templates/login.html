{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #616060 0%, #616060 50%, #616060 100%);
        padding: 20px;
    }

    .login-container {
        width: 100%;
        max-width: 450px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-logo {
        width: 120px;
        height: 120px;
        background: white;
        border-radius: 50%;
        padding: 15px;
        margin: 0 auto 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .login-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .login-header h2 {
        color: white;
        font-size: 2rem;
        margin-bottom: 10px;
        font-weight: 700;
    }

    .login-header p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
    }

    .login-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-card h3 {
        text-align: center;
        color: #616060;
        margin-bottom: 30px;
        font-size: 1.5rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #2d3748;
        font-weight: 500;
    }

    .form-group .input-wrapper {
        position: relative;
    }

    .form-group .input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #a0aec0;
    }

    .form-group input {
        width: 100%;
        padding: 14px 14px 14px 45px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #616060;
        box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
    }

    .btn-login {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #616060 0%, #616060 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(26, 54, 93, 0.4);
    }

    .login-footer {
        text-align: center;
        margin-top: 25px;
        color: #4a5568;
    }

    .login-footer a {
        color: #616060;
        font-weight: 600;
        text-decoration: none;
    }

    .login-footer a:hover {
        text-decoration: underline;
    }

    .school-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.1);
        padding: 10px 20px;
        border-radius: 50px;
        margin-top: 20px;
    }

    .school-badge img {
        width: 30px;
        height: 30px;
    }

    .school-badge span {
        color: white;
        font-weight: 500;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='images/tcc_logo.png') }}" alt="{{ school_short }} Logo">
            </div>
            <h2>Welcome to E-Library</h2>
            <p>{{ school_name }} Digital Library System</p>
            <div class="school-badge">
                <img src="{{ url_for('static', filename='images/tcc_logo.png') }}" alt="TCC">
                <span>Torres Capitol College</span>
            </div>
        </div>

        <div class="login-card">
            <h3>Student Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign Up Now</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
